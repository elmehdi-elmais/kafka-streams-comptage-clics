# Identifies this node in the cluster
node.id=1

# Defines the roles this node plays (it acts as both a broker and a controller)
process.roles=broker,controller

# The address the controller quorum uses to communicate
controller.quorum.voters=1@localhost:9093

# Where Kafka listens for connections
listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
inter.broker.listener.name=PLAINTEXT

# What Kafka tells clients to connect to
advertised.listeners=PLAINTEXT://kafka:9092
controller.listener.names=CONTROLLER

# Storage settings
log.dirs=/opt/kafka/data
num.partitions=1
offsets.topic.replication.factor=1